services:
  # -- Backend (Spring Boot via Docker) --
  - type: web
    name: vyom-doctime-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false   # Set this manually in Render dashboard to your Neon connection string
                      # Format: jdbc:postgresql://<neon-host>/<dbname>?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        sync: false   # Your Neon database username
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false   # Your Neon database password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://vyom-doctime-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://vyom-doctime-frontend.onrender.com
      - key: BACKEND_URL
        value: https://vyom-doctime-backend.onrender.com
      - key: FILE_UPLOAD_DIR
        value: ./uploads
      - key: FILE_MAX_SIZE
        value: 10485760

  # -- Frontend (React Static Site) --
  - type: web
    name: vyom-doctime-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://vyom-doctime-backend.onrender.com/api
      - key: VITE_WS_URL
        value: https://vyom-doctime-backend.onrender.com/ws
      - key: VITE_AGORA_APP_ID
        sync: false
