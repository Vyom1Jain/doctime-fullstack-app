databases:
  - name: doctime-db
    plan: free
    databaseName: doctime
    user: doctime_user

services:
  # ── Backend (Spring Boot) ──
  - type: web
    name: doctime-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_URL
        fromDatabase:
          name: doctime-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: doctime-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: doctime-db
          property: password
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: doctime-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: doctime-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: doctime-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://doctime-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://doctime-frontend.onrender.com
      - key: BACKEND_URL
        value: https://doctime-backend.onrender.com
    healthCheckPath: /api/auth/login

  # ── Frontend (Static Site) ──
  - type: web
    name: doctime-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://doctime-backend.onrender.com/api
      - key: VITE_WS_URL
        value: https://doctime-backend.onrender.com/ws
      - key: VITE_AGORA_APP_ID
        sync: false
