databases:
  - name: vyom-doctime-db
    plan: free
    databaseName: doctime
    user: doctime_user

services:
  # -- Backend (Spring Boot via Docker) --
  - type: web
    name: vyom-doctime-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: vyom-doctime-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: vyom-doctime-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: vyom-doctime-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: vyom-doctime-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: vyom-doctime-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://vyom-doctime-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://vyom-doctime-frontend.onrender.com
      - key: BACKEND_URL
        value: https://vyom-doctime-backend.onrender.com
      - key: FILE_UPLOAD_DIR
        value: ./uploads
      - key: FILE_MAX_SIZE
        value: 10485760

  # -- Frontend (React Static Site) --
  - type: web
    name: vyom-doctime-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://vyom-doctime-backend.onrender.com/api
      - key: VITE_WS_URL
        value: https://vyom-doctime-backend.onrender.com/ws
      - key: VITE_AGORA_APP_ID
        sync: false
