spring:
  datasource:
    url: jdbc:mysql://localhost:3306/doctime?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.doctime: DEBUG
    org.springframework.web: DEBUG
