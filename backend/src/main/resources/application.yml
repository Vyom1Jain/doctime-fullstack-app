server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/doctime?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:doctime_super_secret_key_minimum_256_bits_long!!}
  expiration: 86400000  # 24 hours

agora:
  app:
    id: ${AGORA_APP_ID:YOUR_AGORA_APP_ID}
    certificate: ${AGORA_APP_CERT:YOUR_AGORA_APP_CERT}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logging:
  level:
    com.doctime: DEBUG
    org.springframework.security: WARN
